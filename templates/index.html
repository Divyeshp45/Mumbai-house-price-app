<!DOCTYPE html>
<html>
<head>
    <title>Mumbai House Price Predictor</title>
</head>
<body>

<h2>🏠 Mumbai House Price Prediction</h2>

<form action="/predict" method="post">
    <label>Area (sqft):</label><br>
    <input type="number" name="area" required><br><br>

    <label>BHK:</label><br>
    <select name="bhk">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
    </select><br><br>

    <label>Location:</label><br>
    <select name="location">
        {% for loc in locations %}
        <option>{{ loc }}</option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Predict Price</button>
</form>

{% if prediction %}
<h3>Estimated Price: ₹ {{ prediction }} Lakhs</h3>
{% endif %}

</body>
</html>
