<!DOCTYPE html>
<html>
<head>
    <title>Mumbai House Price Prediction</title>
</head>
<body>

<h2>🏠 Mumbai House Price Prediction</h2>

<form action="/predict" method="POST">

    <label>Area (sqft):</label><br>
    <input type="number" name="area" placeholder="e.g. 850"
           value="{{ area if area else '' }}" required><br><br>

    <label>BHK:</label><br>
    <select name="bhk">
        {% for i in range(1,6) %}
            <option value="{{ i }}"
                {% if bhk == i %}selected{% endif %}>
                {{ i }}
            </option>
        {% endfor %}
    </select><br><br>

    <label>Location:</label><br>
    <select name="location">
        {% for loc in locations %}
            <option value="{{ loc }}"
                {% if loc == selected_location %}selected{% endif %}>
                {{ loc }}
            </option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Predict Price</button>
</form>

{% if prediction %}
    <h3>Estimated Price: ₹ {{ prediction }} Lakhs</h3>
{% endif %}

</body>
</html>
